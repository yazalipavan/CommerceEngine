info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "firstName": "John",
        "lastName": "Doe",
        "email": "john@example.com",
        "password": "Password123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
